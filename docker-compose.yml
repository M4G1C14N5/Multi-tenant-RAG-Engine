version: '3.8'

x-dns: &default_dns
  dns:
    - 8.8.8.8
    - 1.1.1.1
    - 192.168.1.1

services:
  qdrant:
    image: qdrant/qdrant:latest
    <<: *default_dns
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  starfolio-ingest:
    image: python:3.14-slim
    <<: *default_dns
    profiles: ["ingestion"]
    working_dir: /app
    environment:
      STARFOLIO_DIR: /mnt/starfolio
    volumes:
      - ./:/app:ro
      - /home/pluto/starfolio:/mnt/starfolio:ro
    command: ["python", "/app/ingestion/starfolio_ingestion.py"]

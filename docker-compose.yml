version: '3.8'
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  starfolio-ingest:
    image: python:3.14-slim
    profiles: ["ingestion"]
    working_dir: /app
    environment:
      STARFOLIO_DIR: /mnt/starfolio
    volumes:
      - ./:/app:ro
      - /home/pluto/starfolio:/mnt/starfolio:ro
    command: ["python", "/app/scripts/test_starfolio_preprocessing.py"]
